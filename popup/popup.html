<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LinkedIn Referral Automator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 460px;
      background: #f0eeeb;
      color: #1d1d1f;
    }

    /* ── Header ── */
    .header {
      background: #0073b1;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #0073b1;
      flex-shrink: 0;
      letter-spacing: -1px;
    }
    .header-title {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header-sub {
      color: rgba(255,255,255,.65);
      font-size: 11px;
      margin-top: 1px;
    }

    /* ── Sections ── */
    .section {
      background: #fff;
      margin: 8px 8px 0;
      padding: 14px;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
    }
    .section:last-child { margin-bottom: 8px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .section-header h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: #666;
    }
    .section-header .badge {
      font-size: 10px;
      font-weight: 600;
      background: #e8f3fb;
      color: #0073b1;
      border-radius: 10px;
      padding: 1px 7px;
    }

    /* ── Labels ── */
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    label:first-of-type { margin-top: 0; }

    /* ── Tag inputs ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 8px;
      min-height: 36px;
      cursor: text;
      transition: border-color .15s;
      background: #fafafa;
    }
    .tags:focus-within { border-color: #0073b1; background: #fff; }
    .tag {
      background: linear-gradient(135deg, #0073b1, #005f8e);
      color: #fff;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tag .remove {
      cursor: pointer;
      opacity: .6;
      font-size: 14px;
      line-height: 1;
      transition: opacity .1s;
    }
    .tag .remove:hover { opacity: 1; }
    .tag-input {
      border: none;
      outline: none;
      font-size: 13px;
      flex: 1;
      min-width: 90px;
      background: transparent;
      color: #1d1d1f;
    }

    /* ── Textareas ── */
    textarea {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.55;
      background: #fafafa;
      transition: border-color .15s, background .15s;
    }
    textarea:focus { outline: none; border-color: #0073b1; background: #fff; }
    .char-counter { text-align: right; font-size: 11px; color: #aaa; margin-top: 3px; }
    .char-counter.over { color: #d93025; font-weight: 600; }
    .placeholder-hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
      display: flex;
      gap: 6px;
    }
    .placeholder-hint span {
      background: #f4f4f4;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      color: #0073b1;
    }

    /* ── Rate limits ── */
    .limits-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .limit-item { display: flex; flex-direction: column; gap: 4px; }
    .limit-item label { margin: 0; }
    input[type=number], input[type=text] {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      background: #fafafa;
      transition: border-color .15s;
    }
    input[type=number]:focus, input[type=text]:focus { outline: none; border-color: #0073b1; background: #fff; }
    input[type=text].mono { font-size: 11px; font-family: 'Courier New', monospace; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
    }

    /* ── Buttons ── */
    .btn-run-row { margin-bottom: 10px; }
    #btn-run-all {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #0073b1, #005f8e);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .2px;
      transition: opacity .15s, transform .1s;
      box-shadow: 0 2px 6px rgba(0,115,177,.35);
    }
    #btn-run-all:hover { opacity: .92; }
    #btn-run-all:active { transform: scale(.98); }

    .btn-row {
      display: flex;
      gap: 6px;
    }
    .btn-row button {
      flex: 1;
      padding: 7px 4px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      background: #fff;
      color: #444;
      transition: background .12s, border-color .12s, color .12s;
    }
    .btn-row button:hover { background: #f0f8ff; border-color: #0073b1; color: #0073b1; }
    #btn-clear { color: #c0392b; }
    #btn-clear:hover { background: #fff5f5; border-color: #c0392b; color: #c0392b; }

    /* ── Status cards ── */
    .status-cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .status-card {
      background: #f7f7f7;
      border-radius: 8px;
      padding: 8px 6px;
      text-align: center;
      border: 1.5px solid transparent;
    }
    .status-card .card-count {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .status-card .card-label {
      font-size: 10px;
      color: #888;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .card-discovered  { border-color: #ddd; }
    .card-discovered  .card-count { color: #999; }
    .card-conn-sent   { border-color: #ffd89b; background: #fffbf2; }
    .card-conn-sent   .card-count { color: #e67e00; }
    .card-connected   { border-color: #b3d9f0; background: #f0f8ff; }
    .card-connected   .card-count { color: #0073b1; }
    .card-messaged    { border-color: #b2dfdb; background: #f0faf9; }
    .card-messaged    .card-count { color: #1a8a7a; }
    .card-skipped     { border-color: #ffc9c9; background: #fff5f5; }
    .card-skipped     .card-count { color: #c0392b; }

    /* ── Log ── */
    #log {
      height: 120px;
      overflow-y: auto;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      padding: 8px 10px;
      background: #1a1a1a;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      line-height: 1.65;
    }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .log-entry       { color: #ccc; word-break: break-word; }
    .log-entry.ok    { color: #4ec94e; }
    .log-entry.warn  { color: #f0a500; }
    .log-entry.error { color: #f56565; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">in</div>
  <div>
    <div class="header-title">Referral Automator</div>
    <div class="header-sub">Find · Connect · Follow-up</div>
  </div>
</div>

<!-- Section 1: Targets -->
<div class="section">
  <div class="section-header"><h2>Targets</h2></div>
  <label>Companies</label>
  <div class="tags" id="company-tags">
    <input type="text" class="tag-input" id="company-input" placeholder="Type and press Enter…">
  </div>
  <label>Roles</label>
  <div class="tags" id="role-tags">
    <input type="text" class="tag-input" id="role-input" placeholder="Type and press Enter…">
  </div>
</div>

<!-- Section 2: Templates -->
<div class="section">
  <div class="section-header"><h2>Templates</h2></div>
  <label>Connection note <span id="note-limit-hint" style="color:#bbb;font-weight:400;text-transform:none;letter-spacing:0">(max 200 chars — free)</span></label>
  <textarea id="connection-note" rows="3"></textarea>
  <div class="char-counter" id="note-counter">0 / 200</div>
  <label class="checkbox-row"><input type="checkbox" id="is-premium"> Premium / Sales Navigator account (allows 300-char notes)</label>
  <label style="margin-top:12px">Referral message</label>
  <textarea id="referral-message" rows="4"></textarea>
  <div class="placeholder-hint">
    <span>{name}</span><span>{company}</span><span>{role}</span>
  </div>
</div>

<!-- Section 3: Rate Limits -->
<div class="section">
  <div class="section-header"><h2>Rate Limits</h2></div>
  <div class="limits-grid">
    <div class="limit-item">
      <label>Connects / run</label>
      <input type="number" id="max-connections" min="1" max="50" value="15">
    </div>
    <div class="limit-item">
      <label>Messages / run</label>
      <input type="number" id="max-messages" min="1" max="50" value="15">
    </div>
    <div class="limit-item">
      <label>Delay (ms)</label>
      <input type="number" id="action-delay" min="2000" max="30000" step="500" value="4000">
    </div>
  </div>
  <label style="margin-top:10px">GraphQL Query ID <span style="color:#bbb;font-weight:400;text-transform:none;letter-spacing:0">(leave blank for built-in; paste new ID if search breaks)</span></label>
  <input type="text" id="search-query-id" class="mono" placeholder="voyagerSearchDashClusters.abc123…">
</div>

<!-- Section 4: Control -->
<div class="section">
  <div class="section-header"><h2>Control</h2></div>

  <div id="captcha-alert" style="display:none;background:#fff5f5;border:1.5px solid #f56565;border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#c0392b;line-height:1.5">
    &#9888; LinkedIn challenge detected — solve it at <a href="https://www.linkedin.com" target="_blank" style="color:#c0392b">linkedin.com</a> then run again.
  </div>

  <div class="btn-run-row">
    <button id="btn-run-all">▶ Run All Stages</button>
  </div>
  <div class="btn-row">
    <button id="btn-discover">Discover</button>
    <button id="btn-connect">Connect</button>
    <button id="btn-followup">Follow-up</button>
    <button id="btn-cleanup">Cleanup</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div class="status-cards" style="margin-top:12px">
    <div class="status-card card-discovered">
      <div class="card-count" id="count-discovered">0</div>
      <div class="card-label">Found</div>
    </div>
    <div class="status-card card-conn-sent">
      <div class="card-count" id="count-connection_sent">0</div>
      <div class="card-label">Sent</div>
    </div>
    <div class="status-card card-connected">
      <div class="card-count" id="count-connected">0</div>
      <div class="card-label">Connected</div>
    </div>
    <div class="status-card card-messaged">
      <div class="card-count" id="count-message_sent">0</div>
      <div class="card-label">Messaged</div>
    </div>
    <div class="status-card card-skipped">
      <div class="card-count" id="count-skipped">0</div>
      <div class="card-label">Skipped</div>
    </div>
  </div>

  <div id="log"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
